<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketing Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }

  .shell { width: 100%; max-width: 960px; background: #fff; border-radius: 14px; border: 1px solid #e4e4e0; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

  .header { padding: 1.25rem 1.5rem; border-bottom: 1px solid #e4e4e0; display: flex; align-items: center; justify-content: space-between; }
  .header-left h1 { font-size: 17px; font-weight: 600; color: #1a1a18; }
  .header-left p { font-size: 13px; color: #888; margin-top: 2px; }

  .api-bar { display: flex; align-items: center; gap: 8px; }
  .api-bar label { font-size: 12px; color: #888; white-space: nowrap; }
  .api-bar input { border: 1px solid #e4e4e0; border-radius: 8px; padding: 6px 10px; font-size: 12px; font-family: monospace; width: 220px; color: #333; background: #fafaf8; }
  .api-bar input:focus { outline: none; border-color: #aaa; }
  .api-status { font-size: 11px; padding: 4px 8px; border-radius: 6px; white-space: nowrap; }
  .api-status.set { background: #eaf3de; color: #3b6d11; }
  .api-status.unset { background: #faeeda; color: #854f0b; }

  .body { display: flex; min-height: 580px; }

  .sidebar { width: 210px; flex-shrink: 0; border-right: 1px solid #e4e4e0; padding: 1rem; display: flex; flex-direction: column; gap: 5px; }

  .mode-btn { width: 100%; text-align: left; background: none; border: 1px solid transparent; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .mode-btn:hover { background: #f5f5f3; border-color: #e4e4e0; }
  .mode-btn.active { background: #e6f1fb; border-color: #b5d4f4; }
  .mode-btn .icon { font-size: 15px; margin-bottom: 3px; display: block; }
  .mode-btn .label { font-size: 13px; font-weight: 600; color: #1a1a18; display: block; }
  .mode-btn.active .label { color: #185fa5; }
  .mode-btn .desc { font-size: 11px; color: #999; display: block; margin-top: 2px; }
  .mode-btn.active .desc { color: #378add; }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .form-area { padding: 1.25rem 1.5rem; border-bottom: 1px solid #e4e4e0; display: flex; flex-direction: column; gap: 12px; }

  .field label { font-size: 11px; font-weight: 600; color: #999; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field textarea, .field select { width: 100%; border: 1px solid #e4e4e0; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; color: #1a1a18; background: #fff; resize: vertical; transition: border-color 0.15s; }
  .field textarea { min-height: 76px; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: #aaa; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .generate-btn { align-self: flex-start; background: #1a1a18; border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-family: inherit; font-weight: 500; color: #fff; cursor: pointer; transition: opacity 0.15s; }
  .generate-btn:hover { opacity: 0.85; }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .output-area { flex: 1; padding: 1.25rem 1.5rem; overflow-y: auto; position: relative; }
  .output-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px; color: #bbb; font-size: 14px; gap: 10px; }
  .output-placeholder .big { font-size: 36px; }

  .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .output-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; }
  .copy-btn { font-size: 12px; background: none; border: 1px solid #e4e4e0; border-radius: 6px; padding: 4px 10px; cursor: pointer; color: #666; font-family: inherit; }
  .copy-btn:hover { background: #f5f5f3; }

  .output-content { font-size: 14px; line-height: 1.75; color: #1a1a18; }
  .output-content h2 { font-size: 15px; font-weight: 600; margin: 1.25rem 0 0.5rem; color: #1a1a18; }
  .output-content h2:first-child { margin-top: 0; }
  .output-content h3 { font-size: 14px; font-weight: 600; margin: 1rem 0 0.35rem; color: #444; }
  .output-content p { margin-bottom: 0.75rem; }
  .output-content ul, .output-content ol { padding-left: 1.25rem; margin-bottom: 0.75rem; }
  .output-content li { margin-bottom: 4px; }
  .output-content strong { font-weight: 600; }

  .spinner { width: 16px; height: 16px; border: 2px solid #e4e4e0; border-top-color: #888; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state { display: flex; align-items: center; gap: 10px; color: #888; font-size: 14px; padding: 2rem 0; }

  .error-msg { color: #a32d2d; font-size: 14px; padding: 1rem; background: #fcebeb; border-radius: 8px; }

  @media (max-width: 640px) {
    .body { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid #e4e4e0; }
    .mode-btn { width: calc(50% - 3px); }
    .row { grid-template-columns: 1fr; }
    .api-bar input { width: 150px; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-left">
      <h1>Marketing Agent</h1>
      <p>Powered by Claude — strategies, positioning, plans &amp; personas</p>
    </div>
    <div class="api-bar">
      <label for="api-key-input">API key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." oninput="updateApiStatus()" />
      <span class="api-status unset" id="api-status">Not set</span>
    </div>
  </div>

  <div class="body">
    <div class="sidebar">
      <button class="mode-btn active" onclick="setMode('gtm')" id="btn-gtm">
        <span class="icon">🚀</span>
        <span class="label">GTM strategy</span>
        <span class="desc">Go-to-market plan</span>
      </button>
      <button class="mode-btn" onclick="setMode('positioning')" id="btn-positioning">
        <span class="icon">🎯</span>
        <span class="label">Positioning</span>
        <span class="desc">Messaging & differentiation</span>
      </button>
      <button class="mode-btn" onclick="setMode('plan')" id="btn-plan">
        <span class="icon">📋</span>
        <span class="label">Marketing plan</span>
        <span class="desc">Channels & campaigns</span>
      </button>
      <button class="mode-btn" onclick="setMode('icp')" id="btn-icp">
        <span class="icon">👤</span>
        <span class="label">ICP & personas</span>
        <span class="desc">Ideal customer profiles</span>
      </button>
    </div>

    <div class="main">
      <div class="form-area" id="form-area"></div>
      <div class="output-area" id="output-area">
        <div class="output-placeholder">
          <span class="big">✦</span>
          <span>Fill in the details and generate your strategy</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const modes = {
  gtm: {
    label: 'GTM strategy',
    fields: [
      { id: 'product', label: 'Product / service', type: 'text', placeholder: 'e.g. AI-powered HR platform for SMBs' },
      { id: 'stage', label: 'Company stage', type: 'select', options: ['Pre-launch', 'Early stage (0–100 customers)', 'Growth stage', 'Scaling'] },
      { id: 'market', label: 'Target market', type: 'text', placeholder: 'e.g. US-based companies with 10–200 employees' },
      { id: 'competitors', label: 'Key competitors', type: 'text', placeholder: 'e.g. BambooHR, Rippling, Gusto' },
      { id: 'context', label: 'Additional context', type: 'textarea', placeholder: 'Pricing model, differentiators, constraints, goals...' }
    ],
    prompt: (v) => `You are a senior B2B marketing strategist. Create a comprehensive Go-to-Market (GTM) strategy for the following:\n\nProduct: ${v.product}\nCompany stage: ${v.stage}\nTarget market: ${v.market}\nCompetitors: ${v.competitors}\nAdditional context: ${v.context}\n\nStructure the GTM strategy with these sections:\n1. Market opportunity & sizing\n2. Target customer segments\n3. Unique value proposition\n4. Competitive positioning\n5. Channel strategy (top 3 channels with rationale)\n6. Launch phases (3 phases with goals & timelines)\n7. Key metrics & success criteria\n8. Budget allocation (% split across channels)\n\nBe specific, actionable, and tailored to the stage of the company. Use a direct, strategic tone.`
  },
  positioning: {
    label: 'Positioning strategy',
    fields: [
      { id: 'product', label: 'Product / service', type: 'text', placeholder: 'e.g. Project management tool for creative agencies' },
      { id: 'audience', label: 'Primary audience', type: 'text', placeholder: 'e.g. Creative directors at agencies with 10–50 staff' },
      { id: 'problem', label: 'Core problem you solve', type: 'textarea', placeholder: 'What is the primary pain point or job to be done?' },
      { id: 'alternatives', label: 'Current alternatives', type: 'text', placeholder: 'What do customers use today instead?' },
      { id: 'differentiator', label: 'Key differentiator', type: 'text', placeholder: 'What makes you meaningfully different?' }
    ],
    prompt: (v) => `You are an expert brand strategist specializing in B2B SaaS positioning. Create a complete positioning strategy for:\n\nProduct: ${v.product}\nPrimary audience: ${v.audience}\nCore problem solved: ${v.problem}\nCurrent alternatives: ${v.alternatives}\nKey differentiator: ${v.differentiator}\n\nDeliver the following:\n1. Positioning statement (Geoffrey Moore format)\n2. Category definition (what category do you own or create?)\n3. Messaging hierarchy (primary message, 3 supporting pillars, proof points per pillar)\n4. Competitive differentiation matrix (vs each alternative)\n5. Tagline options (3 variations: functional, emotional, bold)\n6. Elevator pitch (30-second version)\n7. Common objections & how to handle them\n\nBe sharp, differentiated, and help them stand out — not blend in.`
  },
  plan: {
    label: 'Marketing plan',
    fields: [
      { id: 'product', label: 'Product / service', type: 'text', placeholder: 'e.g. Cybersecurity platform for healthcare' },
      { id: 'goal', label: 'Primary marketing goal', type: 'select', options: ['Brand awareness', 'Lead generation', 'Pipeline acceleration', 'Customer retention & expansion', 'Product launch'] },
      { id: 'budget', label: 'Annual budget range', type: 'select', options: ['Under $50K', '$50K–$200K', '$200K–$1M', '$1M–$5M', '$5M+'] },
      { id: 'team', label: 'Marketing team size', type: 'select', options: ['Solo / 1 person', '2–5 people', '6–15 people', '15+ people'] },
      { id: 'timeframe', label: 'Planning timeframe', type: 'select', options: ['3 months', '6 months', '12 months'] },
      { id: 'context', label: 'Key context', type: 'textarea', placeholder: 'Current traction, audience, priorities, constraints...' }
    ],
    prompt: (v) => `You are a fractional CMO building a marketing plan. Create a detailed marketing plan for:\n\nProduct: ${v.product}\nPrimary goal: ${v.goal}\nBudget: ${v.budget}\nTeam size: ${v.team}\nTimeframe: ${v.timeframe}\nContext: ${v.context}\n\nStructure the plan as follows:\n1. Situation summary & key assumptions\n2. Marketing objectives (3–5 SMART goals)\n3. Channel mix & rationale (prioritized by ROI potential given team/budget)\n4. Campaign calendar overview (by month or quarter)\n5. Content strategy (themes, formats, cadence)\n6. Demand gen playbook (top 2–3 tactics in detail)\n7. Budget breakdown by channel\n8. KPIs & measurement framework\n9. What to do in the first 30 days\n\nBe pragmatic, prioritized, and realistic for the budget and team size.`
  },
  icp: {
    label: 'ICP & personas',
    fields: [
      { id: 'product', label: 'Product / service', type: 'text', placeholder: 'e.g. Automated accounts payable software' },
      { id: 'market', label: 'Market / industry', type: 'text', placeholder: 'e.g. Mid-market B2B companies in fintech & professional services' },
      { id: 'best_customers', label: 'Describe your best customers', type: 'textarea', placeholder: 'Who are they? What do they have in common? What problems do they have?' },
      { id: 'deal_size', label: 'Typical deal size', type: 'select', options: ['<$1K/year', '$1K–$10K/year', '$10K–$50K/year', '$50K–$250K/year', '$250K+/year'] },
      { id: 'sales_motion', label: 'Sales motion', type: 'select', options: ['Self-serve / PLG', 'Inside sales', 'Enterprise / field sales', 'Channel / partner'] }
    ],
    prompt: (v) => `You are an expert in B2B demand generation and customer research. Create a detailed ICP and buyer persona framework for:\n\nProduct: ${v.product}\nMarket: ${v.market}\nBest customers: ${v.best_customers}\nDeal size: ${v.deal_size}\nSales motion: ${v.sales_motion}\n\nDeliver the following:\n1. Ideal Customer Profile (ICP) — firmographic, technographic, and behavioral criteria\n2. Negative ICP — who to avoid and why\n3. Buying committee map — all roles involved in the decision\n4. 2–3 detailed buyer personas, each including:\n   - Role, seniority, background\n   - Goals & KPIs they're measured on\n   - Biggest pain points & frustrations\n   - Triggers that make them look for a solution\n   - Objections & fears\n   - Where they get information (channels, communities, media)\n   - Best message that resonates with them\n5. Prioritized account scoring criteria\n6. Outreach hooks for each persona (email subject line + opening line)\n\nBe highly specific and actionable for a sales and marketing team.`
  }
};

let currentMode = 'gtm';
let isLoading = false;

function updateApiStatus() {
  const key = document.getElementById('api-key-input').value.trim();
  const status = document.getElementById('api-status');
  if (key.startsWith('sk-ant-') && key.length > 20) {
    status.textContent = 'Ready';
    status.className = 'api-status set';
  } else if (key.length > 0) {
    status.textContent = 'Invalid format';
    status.className = 'api-status unset';
  } else {
    status.textContent = 'Not set';
    status.className = 'api-status unset';
  }
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  renderForm();
  document.getElementById('output-area').innerHTML = `<div class="output-placeholder"><span class="big">✦</span><span>Fill in the details and generate your strategy</span></div>`;
}

function renderField(f) {
  let input = '';
  if (f.type === 'textarea') {
    input = `<textarea id="f-${f.id}" placeholder="${f.placeholder || ''}"></textarea>`;
  } else if (f.type === 'select') {
    input = `<select id="f-${f.id}">${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
  } else {
    input = `<input type="text" id="f-${f.id}" placeholder="${f.placeholder || ''}" />`;
  }
  return `<div class="field"><label>${f.label}</label>${input}</div>`;
}

function renderForm() {
  const config = modes[currentMode];
  const formArea = document.getElementById('form-area');
  let html = '';
  const fields = config.fields;
  let i = 0;
  while (i < fields.length) {
    const f = fields[i];
    if (f.type === 'textarea' || i === fields.length - 1 || fields[i+1]?.type === 'textarea') {
      html += renderField(f);
      i++;
    } else {
      html += `<div class="row">${renderField(fields[i])}${renderField(fields[i+1])}</div>`;
      i += 2;
    }
  }
  html += `<button class="generate-btn" onclick="generate()" id="gen-btn">Generate ↗</button>`;
  formArea.innerHTML = html;
}

function getValues() {
  const v = {};
  modes[currentMode].fields.forEach(f => {
    const el = document.getElementById('f-' + f.id);
    v[f.id] = el ? el.value : '';
  });
  return v;
}

function renderMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h2>$1</h2>');

  const lines = html.split('\n');
  const out = [];
  let inList = false;
  for (const line of lines) {
    const listMatch = line.match(/^[\-\*\d+\.]\s+(.+)/);
    if (listMatch) {
      if (!inList) { out.push('<ul>'); inList = true; }
      out.push(`<li>${listMatch[1]}</li>`);
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      if (line.match(/^<h[23]/)) { out.push(line); }
      else if (line.trim()) { out.push(`<p>${line}</p>`); }
    }
  }
  if (inList) out.push('</ul>');
  return out.join('');
}

async function generate() {
  if (isLoading) return;
  const apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey.startsWith('sk-ant-')) {
    alert('Please enter a valid Anthropic API key (starts with sk-ant-) to generate strategies.');
    document.getElementById('api-key-input').focus();
    return;
  }
  const v = getValues();
  const firstFieldId = modes[currentMode].fields[0].id;
  if (!v[firstFieldId]?.trim()) {
    const el = document.getElementById('f-' + firstFieldId);
    if (el) { el.focus(); el.style.borderColor = '#e24b4a'; setTimeout(() => el.style.borderColor = '', 2000); }
    return;
  }

  isLoading = true;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';
  document.getElementById('output-area').innerHTML = `<div class="loading-state"><span class="spinner"></span>Building your strategy, this takes ~15 seconds...</div>`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: modes[currentMode].prompt(v) }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    const text = data.content?.map(b => b.text || '').join('') || 'No output returned.';
    const modeLabel = modes[currentMode].label;

    document.getElementById('output-area').innerHTML = `
      <div class="output-header">
        <span class="output-label">${modeLabel}</span>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
      <div class="output-content" id="output-text">${renderMarkdown(text)}</div>
    `;
  } catch (e) {
    document.getElementById('output-area').innerHTML = `<div class="error-msg"><strong>Error:</strong> ${e.message}. Check your API key and try again.</div>`;
  }

  isLoading = false;
  btn.disabled = false;
  btn.textContent = 'Generate ↗';
}

function copyOutput() {
  const el = document.getElementById('output-text');
  if (el) navigator.clipboard.writeText(el.innerText);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 2000);
}

renderForm();
</script>
</body>
</html>
